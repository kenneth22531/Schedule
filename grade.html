<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Student Grade Table</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #fafafa;
  }

  h1 {
    text-align: center;
    color: #333;
  }

  table {
    width: 80%;
    margin: 20px auto;
    border-collapse: collapse;
    box-shadow: 0 20px 8px #0000001a;
    background-color: #fff;
  }

  thead {
    background-color: #7063da;
    color: white;
  }

  tbody tr:nth-child(even) {
    background-color: #f2f2f2;
  }

  th, td {
    padding: 12px;
    border: 1px solid #ddd;
    text-align: center;
  }

  tfoot {
    font-weight: bold;
    background-color: #f9f9f9;
  }

 
  tbody tr:hover {
    background-color: #e0f7fa;
  }
</style>
</head>
<body>
<a href="class.html"> <-- Go Back></a>
<h1>Pre-Lim Grade</h1>

<table>
  <thead>
    <tr>
      
      <th>Subject</th>
      <th>Grade</th>
    </tr>
  </thead>
  <tbody>

    </tr>
    <tr>
      
      <td>BASIC ELECT</td>
      <td>1.5</td>
    </tr>
    <tr>
      
      <td>GE10</td>
      <td>1.3</td>
    </tr>
    <tr>
      <td>GE3</td>
      <td>1.1</td>
    </tr>

    <tr>
      <td>DISCRETE1</td>
      <td>1.7</td>
    </tr>
    <tr>
      
      <td>FIL2</td>
      <td>1.1</td>
    </tr>
    <tr>

      <td>IT TRACT EL1</td>

    </tr>
  </tbody>
  <tfoot>
    <tr>
      <td >Total Average</td>
      <td>1.4</td>
    </tr>
  </tfoot>
</table>

</body>
</html>
